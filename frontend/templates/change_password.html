{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4 mt-5">
      <div class="text-center mb-4">
        <h4 class="fw-bold">Seguridad de la Cuenta</h4>
        <p class="text-muted">Por favor, establece una nueva contraseña personal para continuar.</p>
      </div>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Nueva Contraseña</label>
          <input type="password" name="new_password" class="form-control form-control-lg" required minlength="8" placeholder="Mínimo 8 caracteres">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Confirmar Contraseña</label>
          <input type="password" name="confirm_password" class="form-control form-control-lg" required minlength="8" placeholder="Repite la contraseña">
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Actualizar Contraseña</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
